# SENTINAL Custom Tool Definitions for OpenClaw
# Only expose these specific operations — nothing else

tools:
  - name: list_pending_threats
    description: |
      List all pending SENTINAL threat cases that require admin approval.
      Returns case ID, IP, threat type, confidence, and severity.
    method: GET
    endpoint: "${SENTINAL_API_URL}/actions/pending"
    auth: sentinal_internal

  - name: approve_action
    description: |
      Approve a pending SENTINAL action by its case ID.
      This will trigger ArmorClaw verification and then execute the action.
    method: POST
    endpoint: "${SENTINAL_API_URL}/webhook/approve"
    params:
      action_id:
        type: string
        required: true
        description: The case ID from list_pending_threats
    auth: sentinal_internal
    requires_intent_token: true

  - name: reject_action
    description: |
      Reject a pending SENTINAL action by its case ID.
      The action will be cancelled and logged.
    method: POST
    endpoint: "${SENTINAL_API_URL}/webhook/reject"
    params:
      action_id:
        type: string
        required: true
    auth: sentinal_internal
    requires_intent_token: true

  - name: get_audit_log
    description: |
      Retrieve recent SENTINAL audit log entries.
      Shows detection, analysis, approval, and execution events.
    method: GET
    endpoint: "${SENTINAL_API_URL}/audit"
    params:
      hours:
        type: integer
        default: 24
        description: Number of hours to look back
    auth: sentinal_internal

  - name: list_blocked_ips
    description: List all currently blocked IP addresses with block reason and timestamp.
    method: GET
    endpoint: "${SENTINAL_API_URL}/blocked-ips"
    auth: sentinal_internal

  - name: unblock_ip
    description: Remove an IP ban. Use only when a block is confirmed to be a false positive.
    method: POST
    endpoint: "${SENTINAL_API_URL}/actions/unblock"
    params:
      ip:
        type: string
        required: true
    auth: sentinal_internal
    requires_intent_token: true
