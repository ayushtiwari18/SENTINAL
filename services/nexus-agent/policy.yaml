# SENTINAL — Nexus Agent PolicyGuard Policy Definition
# Loaded by policyguard_runtime.py at startup

version: "1.0"
enforcement_level: "PolicyGuard-v1"

allowed_actions:
  - name: send_alert
    description: "Send alert notification to operators"
    risk_level: low
  - name: log_attack
    description: "Record attack in audit trail"
    risk_level: low
  - name: rate_limit_ip
    description: "Apply rate limiting to suspicious IP"
    risk_level: low
  - name: flag_for_review
    description: "Flag IP/event for analyst review"
    risk_level: low
  - name: generate_report
    description: "Generate forensic report for attack"
    risk_level: low

blocked_actions:
  - name: permanent_ban_ip
    description: "Permanently ban an IP address"
    risk_level: high
    reason: "Irreversible — requires human authorization"
  - name: shutdown_endpoint
    description: "Shut down a service endpoint"
    risk_level: critical
    reason: "Critical impact — requires human authorization"
  - name: purge_all_sessions
    description: "Purge all active user sessions"
    risk_level: high
    reason: "Service disruption — requires human authorization"
  - name: modify_firewall_rules
    description: "Modify firewall configuration"
    risk_level: critical
    reason: "Infrastructure change — requires human authorization"

risk_rules:
  - risk_level: critical
    decision: BLOCK
    rule_id: RULE_002
    reason: "Critical-risk actions are never auto-executed"
  - risk_level: high
    decision: BLOCK
    rule_id: RULE_003
    reason: "High-risk actions require human approval"

default_decision: BLOCK
default_reason: "No matching policy rule — default deny (fail-safe)"
default_rule_id: RULE_DEFAULT
