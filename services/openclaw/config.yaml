# OpenClaw Gateway Configuration for SENTINAL
# Place this in the OpenClaw config directory after installation
# Install OpenClaw: curl -fsSL https://armoriq.ai/install-armorclaw.sh | bash

name: SENTINAL Security Operator
description: Secure admin interface for SENTINAL Response Engine

# ArmorIQ credentials
armoriq:
  api_key: "${ARMORIQ_API_KEY}"

# LLM backend for OpenClaw reasoning
llm:
  provider: openai
  model: gpt-4o-mini
  api_key: "${OPENAI_API_KEY}"

# Chat platform integrations
platforms:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    # Restrict to authorized admin chat IDs only
    allowed_chat_ids:
      - "${TELEGRAM_CHAT_ID}"

# SENTINAL webhook endpoints
sentinal:
  base_url: "${SENTINAL_BASE_URL}"
  webhook_approve: "/webhook/approve"
  webhook_reject: "/webhook/reject"
  pending_actions: "/actions/pending"
  audit_log: "/audit"

# ArmorClaw security policy
policy:
  require_intent_token: true
  allowed_tools:
    - sentinal_list_pending
    - sentinal_approve_action
    - sentinal_reject_action
    - sentinal_list_blocked_ips
    - sentinal_get_audit_log
  # Explicitly disallow dangerous tools
  disallowed_tools:
    - shell_exec
    - file_write
    - web_fetch
    - policy_update
