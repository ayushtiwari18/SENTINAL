# SENTINAL Custom Tools for OpenClaw
# These define what admin commands are available via Telegram/Slack
# ArmorClaw verifies each tool call before execution

tools:
  - name: sentinal_list_pending
    description: List all pending threat actions waiting for human approval
    method: GET
    endpoint: "/actions/pending"
    parameters: []
    armoriq:
      requires_approval: false
      policy_tags: ["read", "monitoring"]

  - name: sentinal_approve_action
    description: Approve a pending threat response action (e.g., IP ban)
    method: POST
    endpoint: "/webhook/approve"
    parameters:
      - name: action_id
        type: string
        required: true
        description: The unique ID of the pending action to approve
      - name: note
        type: string
        required: false
        description: Optional admin note for audit log
    armoriq:
      requires_approval: true
      policy_tags: ["write", "enforcement", "destructive"]

  - name: sentinal_reject_action
    description: Reject a pending threat response action
    method: POST
    endpoint: "/webhook/reject"
    parameters:
      - name: action_id
        type: string
        required: true
        description: The unique ID of the pending action to reject
      - name: note
        type: string
        required: false
        description: Optional reason for rejection
    armoriq:
      requires_approval: false
      policy_tags: ["write", "enforcement"]

  - name: sentinal_list_blocked_ips
    description: List all currently blocked IP addresses
    method: GET
    endpoint: "/blocked-ips"
    parameters: []
    armoriq:
      requires_approval: false
      policy_tags: ["read", "monitoring"]

  - name: sentinal_get_audit_log
    description: Retrieve recent audit log entries
    method: GET
    endpoint: "/audit"
    parameters:
      - name: hours
        type: integer
        required: false
        default: 24
        description: Number of hours to look back (default 24)
    armoriq:
      requires_approval: false
      policy_tags: ["read", "audit"]
