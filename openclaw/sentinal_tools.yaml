# SENTINAL Custom Tools for OpenClaw
# Defines the operator commands available via Telegram through OpenClaw.
# These are the ONLY actions the admin can trigger via chat.

tools:
  - name: sentinal_approve_action
    description: Approve a pending SENTINAL action (e.g., IP ban)
    parameters:
      action_id:
        type: string
        required: true
        description: The case/action ID to approve
    http:
      method: POST
      url: "${SENTINAL_BACKEND_URL}/webhook/approve"
      params:
        action_id: "${action_id}"
    policy:
      requires_intent_token: true
      audit: true

  - name: sentinal_reject_action
    description: Reject a pending SENTINAL action
    parameters:
      action_id:
        type: string
        required: true
        description: The case/action ID to reject
    http:
      method: POST
      url: "${SENTINAL_BACKEND_URL}/webhook/reject"
      params:
        action_id: "${action_id}"
    policy:
      requires_intent_token: true
      audit: true

  - name: sentinal_list_pending
    description: List all pending SENTINAL actions awaiting approval
    parameters: {}
    http:
      method: GET
      url: "${SENTINAL_BACKEND_URL}/actions/pending"
    policy:
      requires_intent_token: false
      audit: false

  - name: sentinal_get_audit_log
    description: Retrieve recent SENTINAL audit log entries
    parameters:
      hours:
        type: integer
        required: false
        default: 24
        description: How many hours of history to retrieve
    http:
      method: GET
      url: "${SENTINAL_BACKEND_URL}/audit"
      params:
        hours: "${hours}"
    policy:
      requires_intent_token: false
      audit: false

  - name: sentinal_get_blocked_ips
    description: Get list of currently blocked IP addresses
    parameters: {}
    http:
      method: GET
      url: "${SENTINAL_BACKEND_URL}/blocked-ips"
    policy:
      requires_intent_token: false
      audit: false
